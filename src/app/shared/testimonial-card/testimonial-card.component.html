<article class="rounded-[20px] border border-gray-cararra bg-white p-8">
  <div class="mb-4 tracking-[2px] text-amber-600" aria-hidden="true">★★★★★</div>
  <blockquote class="mb-6 text-[0.95rem] italic leading-relaxed text-gray-dusty">
    “{{ quote() }}”
  </blockquote>
  <div class="flex items-center gap-3">
    <div
      class="flex size-10 items-center justify-center rounded-[10px] bg-gray-pampas text-[0.85rem] font-bold text-gray-dusty"
    >
      {{ initials() }}
    </div>
    <div>
      <div class="text-sm font-semibold">{{ name() }}</div>
      <div class="text-[0.78rem] text-gray-dusty">{{ role() }}</div>
    </div>
  </div>
</article>
