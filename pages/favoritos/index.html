<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNova — Mis favoritos</title>
    <link href="/src/style.css" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/favoritos.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/src/main.js" type="module"></script>
  </head>
  <body>
    <app-navbar active="favoritos"></app-navbar>

    <main class="page-container flex flex-col gap-10 pb-25">
      <header
        class="animate-fade-up flex flex-col items-start justify-between gap-5 sm:flex-row sm:items-end"
      >
        <div>
          <h1
            class="font-title text-[clamp(2.25rem,4.5vw,3.25rem)] font-normal leading-tight tracking-tight text-gray-cod"
          >
            Mis <em class="not-italic text-blue-royal">favoritos</em>
          </h1>
          <p class="mt-2 text-base text-gray-dove">
            Tus servicios guardados para acceso rápido.
          </p>
        </div>
        <div
          id="favCounter"
          class="hidden inline-flex items-center gap-2 rounded-full bg-blue-royal/10 px-4 py-2 text-sm font-semibold text-blue-royal"
        >
          ♥ <span id="countNum">0</span> servicios guardados
        </div>
      </header>

      <section class="flex flex-col gap-8">
        <div
          id="favGrid"
          hidden
          class="grid grid-cols-1 gap-5 lg:grid-cols-2"
        ></div>

        <div
          id="emptyState"
          class="animate-fade-up px-6 py-20 text-center sm:px-10"
        >
          <div
            class="mx-auto mb-6 flex h-[88px] w-[88px] items-center justify-center rounded-full bg-gray-pampas text-[2.5rem]"
          >
            ♡
          </div>
          <h3 class="mb-2 text-[22px] font-semibold text-gray-cod">
            No tienes favoritos aún
          </h3>
          <p
            class="mx-auto mb-7 max-w-[400px] text-[15px] text-gray-dove"
          >
            Explora nuestro catálogo de servicios y guarda los que más te
            interesen para acceder a ellos rápidamente.
          </p>
          <app-button
            href="/pages/servicios/"
            type="primary"
            custom-class="px-7 py-3.5 text-[0.9375rem] font-semibold shadow-[0_2px_8px_rgba(0,0,0,0.15)] ease-[cubic-bezier(0.4,0,0.2,1)] hover:-translate-y-0.5 hover:shadow-[0_4px_16px_rgba(0,0,0,0.2)]"
          >
            Explorar servicios
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M3 8h10M9 4l4 4-4 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </app-button>
        </div>
      </section>
    </main>

    <app-footer></app-footer>

    <script src="/src/js/favoritos.js" type="module"></script>
  </body>
</html>
