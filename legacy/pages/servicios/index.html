<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNova - Servicios</title>
    <link href="/src/style.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/src/main.js" type="module"></script>
  </head>
  <body>
    <app-navbar active="servicios"></app-navbar>
    <main class="page-container">
      <div id="grid-view" class="flex flex-col gap-15">
        <section>
          <h1
            class="font-title text-gray-cod mb-4 text-[3.3rem] leading-[1.1] tracking-tight"
          >
            Nuestros
            <span class="text-blue-royal italic">servicios</span>
          </h1>
          <p class="max-w-[580px] text-[1.1rem] leading-relaxed text-gray-dove">
            Explora todas las soluciones tecnológicas que tenemos disponibles
            para tu empresa.
          </p>
        </section>

        <section>
          <div class="mb-10 flex flex-wrap gap-3">
            <div
              id="category-filters"
              class="flex flex-wrap items-center gap-2"
            ></div>

            <div class="relative ml-auto w-[250px]">
              <span
                class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-[.7rem]"
              >
                🔍
              </span>
              <input
                id="services-search"
                type="search"
                placeholder="Buscar servicios…"
                class="w-full rounded-xl border border-gray-cararra bg-white py-2 pl-8 pr-5 text-[.9rem] text-gray-cod outline-none placeholder:text-[#9E9E9E] focus:border-gray-cod transition-colors"
              />
            </div>
          </div>

          <div
            id="services-grid"
            class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3"
          ></div>
        </section>
      </div>

      <div id="detail-view" class="hidden"></div>
    </main>

    <app-footer></app-footer>

    <app-modal id="service-modal" title="Nuevo servicio">
      <form id="add-service-form" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <div class="flex gap-2">
            <div class="flex flex-col gap-1">
              <label for="emoji" class="text-sm font-medium text-gray-cod">
                Icono <span class="text-red-500">*</span>
              </label>
              <input
                id="emoji"
                type="text"
                maxlength="2"
                placeholder="⚙️"
                required
                class="w-14 rounded-md border border-gray-cararra bg-white px-3 py-2 text-center text-sm text-gray-cod placeholder:text-gray-dusty outline-none focus:border-gray-cod transition-colors"
              />
            </div>
            <div class="flex flex-col gap-1 flex-1">
              <label for="name" class="text-sm font-medium text-gray-cod">
                Nombre <span class="text-red-500">*</span>
              </label>
              <input
                id="name"
                type="text"
                maxlength="100"
                class="flex-1 rounded-md border border-gray-cararra bg-white px-4 py-2 text-sm text-gray-cod placeholder:text-gray-dusty outline-none focus:border-gray-cod transition-colors"
                required
              />
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <label for="description" class="text-sm font-medium text-gray-cod">
            Descripción <span class="text-red-500">*</span>
          </label>
          <textarea
            id="description"
            maxlength="500"
            rows="3"
            placeholder="Describe el servicio..."
            class="rounded-md border border-gray-cararra bg-white px-4 py-2 text-sm text-gray-cod placeholder:text-gray-dusty outline-none focus:border-gray-cod transition-colors resize-none"
            required
          ></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <label for="time" class="text-sm font-medium text-gray-cod">
              Tiempo estimado <span class="text-red-500">*</span>
            </label>
            <input
              id="time"
              type="text"
              maxlength="50"
              placeholder="Ej: 2 semanas"
              class="rounded-md border border-gray-cararra bg-white px-4 py-2 text-sm text-gray-cod placeholder:text-gray-dusty outline-none focus:border-gray-cod transition-colors"
              required
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="category" class="text-sm font-medium text-gray-cod">
              Categoría <span class="text-red-500">*</span>
            </label>
            <select
              id="category"
              class="rounded-md border border-gray-cararra bg-white px-4 py-2 text-sm text-gray-cod outline-none focus:border-gray-cod transition-colors cursor-pointer"
              required
            >
              <option value="">Selecciona…</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-sm font-medium text-gray-cod">
            Modalidad <span class="text-red-500">*</span>
          </span>
          <div class="flex gap-5">
            <label
              class="flex items-center gap-2 text-sm text-gray-cod cursor-pointer"
            >
              <input
                type="checkbox"
                id="remote"
                class="accent-gray-cod cursor-pointer"
              />
              Remoto
            </label>
            <label
              class="flex items-center gap-2 text-sm text-gray-cod cursor-pointer"
            >
              <input
                type="checkbox"
                id="hybrid"
                class="accent-gray-cod cursor-pointer"
              />
              Híbrido
            </label>
          </div>
          <p id="modality-error" class="hidden text-xs text-red-500">
            Selecciona al menos una modalidad.
          </p>
        </div>

        <div class="flex flex-col gap-1">
          <label for="technologies" class="text-sm font-medium text-gray-cod">
            Tecnologías usadas
          </label>
          <input
            id="technologies"
            type="text"
            maxlength="50"
            class="rounded-md border border-gray-cararra bg-white px-4 py-2 text-sm text-gray-cod placeholder:text-gray-dusty outline-none focus:border-gray-cod transition-colors"
          />
        </div>

        <div class="flex flex-col gap-2">
          <span class="text-sm font-medium text-gray-cod">
            Servicios que incluye
          </span>
          <div id="includes-list" class="flex flex-col gap-2"></div>
          <button
            type="button"
            id="add-include"
            class="mt-1 inline-flex items-center gap-1 text-sm text-blue-royal hover:opacity-70 transition-opacity cursor-pointer w-max"
          >
            + Agregar ítem
          </button>
        </div>
      </form>
    </app-modal>

    <script src="/src/js/servicios.js" type="module" defer></script>
  </body>
</html>
