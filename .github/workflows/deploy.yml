name: Deploy to GitHub Pages

on:
  # Despliega automáticamente al hacer push a main.
  push:
    branches: [main]
  # Permite disparar el deploy manualmente desde la pestaña Actions.
  workflow_dispatch:

# Permisos que necesita el job para escribir en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; si llega otro mientras corre, espera.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        # base-href usa el nombre del repo. Para "owner/foo-bar" queda "/foo-bar/".
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: SPA fallback (404 → index.html)
        # GitHub Pages devuelve 404.html cuando una ruta no existe como archivo.
        # Copiando index.html como 404.html, las rutas Angular siguen funcionando
        # cuando el usuario refresca en /servicios, /contacto, etc.
        run: cp dist/technova/browser/index.html dist/technova/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/technova/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
